<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Pilot - Test Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        h1 {
            color: #569cd6;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            background: #1177bb;
        }
        #output {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            min-height: 400px;
            white-space: pre-wrap;
        }
        .success { color: #4ec9b0; }
        .error { color: #f14c4c; }
        .info { color: #9cdcfe; }
    </style>
</head>
<body>
    <h1>🧪 Workflow Pilot - Test Runner</h1>
    
    <div class="controls">
        <button onclick="runAllTests()">▶ Run All Tests</button>
        <button onclick="runContextTests()">Run Context Tests</button>
        <button onclick="runExpressionTests()">Run Expression Tests</button>
        <button onclick="runEngineTests()">Run Engine Tests</button>
        <button onclick="clearOutput()">Clear</button>
    </div>
    
    <div id="output">Click "Run All Tests" to execute test suites...</div>

    <script type="module">
        // Import test modules
        // Note: These paths assume running from Odoo dev server
        // For standalone testing, adjust paths accordingly
        
        import { ExecutionContext } from '../core/context.js';
        import * as ExpressionUtils from '../utils/expression_utils.js';
        
        // Make available globally for test files
        window.ExecutionContext = ExecutionContext;
        window.ExpressionUtils = ExpressionUtils;
        
        // Simple console capture
        const output = document.getElementById('output');
        const originalLog = console.log;
        const originalError = console.error;
        const originalGroup = console.group;
        const originalGroupEnd = console.groupEnd;
        
        let indent = 0;
        
        console.log = (...args) => {
            originalLog(...args);
            const prefix = '  '.repeat(indent);
            output.innerHTML += `<span class="success">${prefix}${args.join(' ')}</span>\n`;
        };
        
        console.error = (...args) => {
            originalError(...args);
            const prefix = '  '.repeat(indent);
            output.innerHTML += `<span class="error">${prefix}${args.join(' ')}</span>\n`;
        };
        
        console.group = (label) => {
            originalGroup(label);
            const prefix = '  '.repeat(indent);
            output.innerHTML += `<span class="info">${prefix}${label}</span>\n`;
            indent++;
        };
        
        console.groupEnd = () => {
            originalGroupEnd();
            indent = Math.max(0, indent - 1);
        };
        
        // Test runner functions
        window.clearOutput = () => {
            output.innerHTML = '';
        };
        
        window.runAllTests = async () => {
            clearOutput();
            output.innerHTML += '<span class="info">═══════════════════════════════════════</span>\n';
            output.innerHTML += '<span class="info">   WORKFLOW PILOT TEST SUITE</span>\n';
            output.innerHTML += '<span class="info">═══════════════════════════════════════</span>\n\n';
            
            await runContextTests();
            output.innerHTML += '\n';
            await runExpressionTests();
            output.innerHTML += '\n';
            await runEngineTests();
            
            output.innerHTML += '\n<span class="info">═══════════════════════════════════════</span>\n';
            output.innerHTML += '<span class="success">   All test suites completed!</span>\n';
            output.innerHTML += '<span class="info">═══════════════════════════════════════</span>\n';
        };
        
        window.runContextTests = async () => {
            output.innerHTML += '<span class="info">Running ExecutionContext tests...</span>\n\n';
            
            // Import and run
            try {
                const { TestContext } = await import('./test_context.js');
                TestContext.run();
            } catch (err) {
                console.error('Failed to load test_context.js:', err.message);
            }
        };
        
        window.runExpressionTests = async () => {
            output.innerHTML += '<span class="info">Running Expression Utils tests...</span>\n\n';
            
            try {
                const { TestExpressionUtils } = await import('./test_expression_utils.js');
                TestExpressionUtils.run();
            } catch (err) {
                console.error('Failed to load test_expression_utils.js:', err.message);
            }
        };
        
        window.runEngineTests = async () => {
            output.innerHTML += '<span class="info">Running MockExecutionEngine tests...</span>\n\n';
            
            try {
                const { TestMockExecutionEngine } = await import('./test_mock_execution_engine.js');
                await TestMockExecutionEngine.run();
            } catch (err) {
                console.error('Failed to load test_mock_execution_engine.js:', err.message);
            }
        };
    </script>
</body>
</html>
