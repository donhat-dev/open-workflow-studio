[options]
; Database
db_host = host.docker.internal
db_port = 5432
db_user = odoo
db_password = odoo
db_name = hrm_pro_18

; Addons
addons_path = /opt/odoo/source/odoo/addons,/opt/odoo/open-workflow-studio,/opt/odoo/queue,/opt/odoo/hrm-odoo/addons/core,/opt/odoo/hrm-odoo/addons/hrm,/opt/odoo/hrm-odoo/addons/third_party

; Server
http_port = 8069
proxy_mode = False
without_demo = all

; Dev
dev_mode = xml

; Data dir
data_dir = /home/odoo/.local/share/Odoo

; Logging
log_level = info
