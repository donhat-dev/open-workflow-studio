exclude: |
  (?x)
  ^dist/|
  ^node_modules/|
  ^tmp/|
  ^memory-bank/|
  ^docs/description/|
  ^README\.md$|
  ^index\.html$|
  ^workflow_automation_bento_clone\.html$|
  ^\.agent/|
  ^\.claude/|
  ^\.github/instructions/|
  ^stock_barcode/|
  ^lf_web_studio/|
  \.svg$|/static/(src/)?lib/|/static/description/|/build/|/dist/|
  (LICENSE.*|COPYING.*)
default_language_version:
  python: python3
repos:
  - repo: local
    hooks:
      - id: forbidden-files
        name: forbidden files
        entry: found forbidden files; remove them
        language: fail
        files: "\\.rej$"
      - id: en-po-files
        name: en.po files cannot exist
        entry: found a en.po file
        language: fail
        files: "[a-zA-Z0-9_]*/i18n/en\\.po$"
  - repo: https://github.com/oca/maintainer-tools
    rev: bf9ecb9938b6a5deca0ff3d870fbd3f33341fded
    hooks:
      - id: oca-update-pre-commit-excluded-addons
      - id: oca-gen-addon-readme
        files: ^(workflow_studio|workflow_studio_queue_job)/
        args:
          - --addons-dir=.
          - --branch=18.0
          - --org-name=donhat-dev
          - --repo-name=workflow_automation_builder
          - --if-source-changed
          - --keep-source-digest
          - --convert-fragments-to-markdown
  - repo: https://github.com/OCA/odoo-pre-commit-hooks
    rev: v0.0.33
    hooks:
      - id: oca-checks-odoo-module
        files: ^(workflow_studio|workflow_studio_queue_job)/
      - id: oca-checks-po
        args:
          - --disable=po-pretty-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: /README\.rst$|\.pot?$
      - id: end-of-file-fixer
        exclude: /README\.rst$|\.pot?$
      - id: debug-statements
      - id: fix-encoding-pragma
        args: ["--remove"]
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
        exclude: /README\.rst$|^docs/.*\.rst$
      - id: check-symlinks
      - id: check-xml
      - id: mixed-line-ending
        exclude: /README\.rst$
        args: ["--fix=lf"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.8
    hooks:
      - id: ruff
        files: ^(workflow_studio|workflow_studio_queue_job)/.*\.py$
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        files: ^(workflow_studio|workflow_studio_queue_job)/.*\.py$
  - repo: https://github.com/OCA/pylint-odoo
    rev: v9.1.3
    hooks:
      - id: pylint_odoo
        name: pylint with optional checks
        files: ^(workflow_studio|workflow_studio_queue_job)/.*\.py$
        args:
          - --rcfile=.pylintrc
          - --exit-zero
        verbose: true
      - id: pylint_odoo
        files: ^(workflow_studio|workflow_studio_queue_job)/.*\.py$
        args:
          - --rcfile=.pylintrc-mandatory
