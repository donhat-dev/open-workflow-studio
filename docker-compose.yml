services:
  odoo:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: odoo-workflow-dev
    restart: unless-stopped
    ports:
      - "${ODOO_PORT:-8069}:8069"
      - "${DEBUGPY_PORT:-5678}:5678"
    volumes:
      # Odoo 18 EE source (read-only)
      - ${ODOO_SOURCE_PATH:-C:/Users/ODOO/Documents/GitHub/18EE-NS}:/opt/odoo/source:ro
      # Odoo addons (read-write for live editing)
      - C:/Users/ODOO/Documents/GitHub/18EE-NS/odoo/addons:/opt/odoo/odoo/addons:rw
      # Custom addons (read-write for live editing)
      - ./workflow_studio:/opt/odoo/custom/workflow_studio:rw
      - ./workflow_studio_queue_job:/opt/odoo/custom/workflow_studio_queue_job:rw
      - ./flight_json_widget:/opt/odoo/custom/flight_json_widget:rw
      - ./lf_web_studio:/opt/odoo/custom/lf_web_studio:rw
      - C:\Users\ODOO\Documents\GitHub\hrm-odoo\addons\hrm:/opt/odoo/hrm_addons:rw
      - C:\Users\ODOO\Documents\GitHub\hrm-odoo\addons\third_party:/opt/odoo/third_party_addons:rw
      - C:\Users\ODOO\Documents\GitHub\hrm-odoo\addons\core:/opt/odoo/core_addons:rw
      - C:\Users\ODOO\Documents\GitHub\queue:/opt/odoo/queue:rw
      # Config (live-mounted, no rebuild needed)
      - ./docker/odoo.conf:/etc/odoo/odoo.conf:ro
      # Persistent data
      - C:/var/lib/odoo:/opt/odoo/data
      # Bytecode cache (native Docker volume — fast I/O, survives restart)
      - pycache:/tmp/pycache
    env_file:
      - ./docker/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ODOO_DEBUG=${ODOO_DEBUG:-1}
      - DEBUGPY_ENABLE=${DEBUGPY_ENABLE:-0}
      - DEBUGPY_PORT=${DEBUGPY_PORT:-5678}
      # Container identity (routing key for control plane)
      - PGDATABASE=${PGDATABASE:-hrm_pro_18}
      # DB connection — overridable from control plane, defaults from .env
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-odoo}
      - DB_PASSWORD=${DB_PASSWORD:-odoo}
      # Supervisor tuning
      - SUPERVISOR_IDLE_TIMEOUT=${SUPERVISOR_IDLE_TIMEOUT:-900}
      - SUPERVISOR_CRON_INTERVAL=${SUPERVISOR_CRON_INTERVAL:-300}
      - SUPERVISOR_CRON_TIMEOUT=${SUPERVISOR_CRON_TIMEOUT:-120}
      - SUPERVISOR_PRECOMPILE=${SUPERVISOR_PRECOMPILE:-0}
      # Performance (mirrored from odoo.sh)
      - PGOPTIONS=-c jit=off
      - OMP_NUM_THREADS=1
      - NUMEXPR_MAX_THREADS=1
      - SPT_NOENV=1

volumes:
  pycache:
