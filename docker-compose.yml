services:
  odoo:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: odoo-workflow-dev
    restart: unless-stopped
    ports:
      - "${ODOO_PORT:-8069}:8069"
    volumes:
      # Odoo 18 EE source (read-only)
      - ${ODOO_SOURCE_PATH:-/home/odoo/workspace/18EE-NS}:/opt/odoo/source:ro
      # Addon roots mirrored from the current WSL launch config
      - ${OPEN_WORKFLOW_STUDIO_PATH:-/home/odoo/workspace/open-workflow-studio}:/opt/odoo/open-workflow-studio:rw
      - ${QUEUE_ADDONS_PATH:-/home/odoo/workspace/queue}:/opt/odoo/queue:rw
      - ${HRM_CORE_ADDONS_PATH:-/home/odoo/workspace/hrm-odoo/addons/core}:/opt/odoo/hrm-odoo/addons/core:rw
      - ${HRM_HRM_ADDONS_PATH:-/home/odoo/workspace/hrm-odoo/addons/hrm}:/opt/odoo/hrm-odoo/addons/hrm:rw
      - ${HRM_THIRD_PARTY_ADDONS_PATH:-/home/odoo/workspace/hrm-odoo/addons/third_party}:/opt/odoo/hrm-odoo/addons/third_party:rw
      # Config (live-mounted, no rebuild needed)
      - ./docker/odoo.conf:/etc/odoo/odoo.conf:ro
      # Persistent data
      - ${ODOO_DATA_DIR:-/home/odoo/.local/share/Odoo}:/home/odoo/.local/share/Odoo:rw
    env_file:
      - ./docker/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ODOO_DEBUG=${ODOO_DEBUG:-0}

volumes:
  pycache:
